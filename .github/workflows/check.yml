name: hoyousho check

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download last data
        uses: actions/download-artifact@v4
        with:
          name: last-dates
          path: .
        continue-on-error: true  # 初回は無くてもOK

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install aiohttp requests beautifulsoup4
          

      - name: Run script
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python line_test.py

      - name: Upload last data
        uses: actions/upload-artifact@v4
        with:
          name: last-dates
          path: last_dates.json
