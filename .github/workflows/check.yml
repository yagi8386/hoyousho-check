name: hoyousho check

on:
  workflow_dispatch:

concurrency:
  group: hoyousho-check
  cancel-in-progress: false   # ← ここ重要（最後まで実行）

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install aiohttp requests beautifulsoup4

      - name: Run script
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python line_test.py

      - name: Commit & Push（リトライ付き）
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add last_dates.json
          git commit -m "update last dates" || echo "no changes"

          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            sleep 2
          done
